syntax = "proto3";

package smailnail.annotationui.v1;

option go_package = "github.com/go-go-golems/smailnail/pkg/gen/smailnail/annotationui/v1;annotationuiv1";

import "google/protobuf/struct.proto";
import "smailnail/annotationui/v1/review.proto";

// Wire-format contract for the rest of the annotation UI HTTP layer beyond
// review feedback/guidelines. This file covers read models for annotations,
// groups, logs, runs, senders, server info, and the query workbench payloads.

message DatabaseInfo {
  string driver = 1;
  string target = 2;
  string mode = 3;
}

message InfoResponse {
  string service = 1;
  string version = 2;
  string started_at = 3;
  DatabaseInfo database = 4;
}

message Annotation {
  string id = 1;
  string target_type = 2;
  string target_id = 3;
  string tag = 4;
  string note_markdown = 5;
  string source_kind = 6;
  string source_label = 7;
  string agent_run_id = 8;
  string review_state = 9;
  string created_by = 10;
  string created_at = 11;
  string updated_at = 12;
}

message AnnotationListRequest {
  string target_type = 1;
  string target_id = 2;
  string tag = 3;
  string review_state = 4;
  string source_kind = 5;
  string agent_run_id = 6;
  int32 limit = 7;
}

message AnnotationListResponse {
  repeated Annotation items = 1;
}

message TargetGroup {
  string id = 1;
  string name = 2;
  string description = 3;
  string source_kind = 4;
  string source_label = 5;
  string agent_run_id = 6;
  string review_state = 7;
  string created_by = 8;
  string created_at = 9;
  string updated_at = 10;
}

message GroupMember {
  string group_id = 1;
  string target_type = 2;
  string target_id = 3;
  string added_at = 4;
}

message GroupDetail {
  string id = 1;
  string name = 2;
  string description = 3;
  string source_kind = 4;
  string source_label = 5;
  string agent_run_id = 6;
  string review_state = 7;
  string created_by = 8;
  string created_at = 9;
  string updated_at = 10;
  repeated GroupMember members = 11;
}

message GroupListRequest {
  string review_state = 1;
  string source_kind = 2;
  int32 limit = 3;
}

message GroupListResponse {
  repeated TargetGroup items = 1;
}

message AnnotationLog {
  string id = 1;
  string log_kind = 2;
  string title = 3;
  string body_markdown = 4;
  string source_kind = 5;
  string source_label = 6;
  string agent_run_id = 7;
  string created_by = 8;
  string created_at = 9;
}

message LogListRequest {
  string source_kind = 1;
  string agent_run_id = 2;
  int32 limit = 3;
}

message LogListResponse {
  repeated AnnotationLog items = 1;
}

message AgentRunSummary {
  string run_id = 1;
  string source_label = 2;
  string source_kind = 3;
  int32 annotation_count = 4;
  int32 pending_count = 5;
  int32 reviewed_count = 6;
  int32 dismissed_count = 7;
  int32 log_count = 8;
  int32 group_count = 9;
  string started_at = 10;
  string completed_at = 11;
}

message AgentRunDetail {
  string run_id = 1;
  string source_label = 2;
  string source_kind = 3;
  int32 annotation_count = 4;
  int32 pending_count = 5;
  int32 reviewed_count = 6;
  int32 dismissed_count = 7;
  int32 log_count = 8;
  int32 group_count = 9;
  string started_at = 10;
  string completed_at = 11;
  repeated Annotation annotations = 12;
  repeated AnnotationLog logs = 13;
  repeated TargetGroup groups = 14;
}

message AgentRunListResponse {
  repeated AgentRunSummary items = 1;
}

message SenderRow {
  string email = 1;
  string display_name = 2;
  string domain = 3;
  int32 message_count = 4;
  int32 annotation_count = 5;
  repeated string tags = 6;
  bool has_unsubscribe = 7;
}

message MessagePreview {
  uint32 uid = 1;
  string subject = 2;
  string date = 3;
  int32 size_bytes = 4;
  string mailbox_name = 5;
}

message SenderDetail {
  string email = 1;
  string display_name = 2;
  string domain = 3;
  int32 message_count = 4;
  int32 annotation_count = 5;
  repeated string tags = 6;
  bool has_unsubscribe = 7;
  string first_seen = 8;
  string last_seen = 9;
  repeated Annotation annotations = 10;
  repeated AnnotationLog logs = 11;
  repeated MessagePreview recent_messages = 12;
}

message SenderGuidelineGroup {
  string run_id = 1;
  string source_label = 2;
  string source_kind = 3;
  repeated ReviewGuideline guidelines = 4;
}

message SenderGuidelineListResponse {
  repeated SenderGuidelineGroup items = 1;
}

message SenderListRequest {
  string domain = 1;
  optional bool has_annotations = 2;
  string tag = 3;
  int32 limit = 4;
}

message SenderListResponse {
  repeated SenderRow items = 1;
}

message SavedQuery {
  string name = 1;
  string folder = 2;
  string description = 3;
  string sql = 4;
}

message SavedQueryListResponse {
  repeated SavedQuery items = 1;
}

message ExecuteQueryRequest {
  string sql = 1;
}

message QueryResult {
  repeated string columns = 1;
  repeated google.protobuf.Struct rows = 2;
  int64 duration_ms = 3;
  int32 row_count = 4;
}

message SaveQueryRequest {
  string name = 1;
  string folder = 2;
  string description = 3;
  string sql = 4;
}
