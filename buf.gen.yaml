version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg/gen
    opt:
      - paths=source_relative
  - remote: buf.build/community/stephenh-ts-proto
    out: ui/src/gen
    opt:
      - outputServices=none
      - outputEncodeMethods=false
      - outputJsonMethods=false
      - outputClientImpl=false
      - useOptionals=messages
